server:
  port: 8080

spring:
  application:
    name: account
  profiles:
    active: "prod"
  config:
    import: "optional:configserver:http://localhost:8071/"
  datasource:
    url: jdbc:mysql://localhost:3306/accountdb
    username: root
    password: system@123
  jpa:
    show-sql: true
  sql:
    init:
      mode: ALWAYS

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      enabled: true
  info:
    env:
      enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka/

info:
  app:
    name: account
    description: "EasyBank account application"
    version: 1.0.0